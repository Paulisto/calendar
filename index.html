<html lang="en" class="">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport"content="width=device-width, initial-scale=1.0"/>
        <script>
            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.classList.add("dark");
            }
        </script> 
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss">
            @import "tailwindcss";
            @custom-variant dark (&:where(.dark, .dark *));
        </style>
        <link rel="stylesheet" href="styles.css" type="text/css">
        <title>Calendar</title>
    </head>
    <body>
        <div class="flex h-screen">
            <aside class="pl-4 pt-3 left-0 z-40 w-1/5 bg-gray-200 dark:bg-gray-950">
                <div class="my-6">
                    <h1 class="text-xl font-bold dark:text-white">Calendar</h1>
                </div>
                <!--Toggle between light and dark mode-->
                <div class="relative inline-block group">
                    <button onclick="toggleTheme()" type="button" class="rounded-full bg-gray-400 dark:bg-slate-800">
                        <span id="moon-icon" class="inline-flex shrink-0 justify-center items-center size-9 dark:hidden">
                            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" 
                                width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                            </svg>
                        </span>

                        <span id="sun-icon" class="shrink-0 justify-center items-center size-9 hidden dark:inline-flex">
                            <svg class="shrink-0 size-4 dark:stroke-white" xmlns="http://www.w3.org/2000/svg" 
                            width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/>
                            <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/>
                            <path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/>
                            <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
                            </svg>
                        </span>
                    </button>

                    <div class="absolute left-full top-1/2 -translate-y-1/2 ml-3 whitespace-nowrap rounded bg-slate-800 px-3 py-1.5 text-xs font-medium text-white opacity-0 transition-opacity duration-300 group-hover:opacity-100 pointer-events-none">
                        <span class="inline-flex dark:hidden">Switch to dark mode</span>
                        <span class="hidden dark:inline">Switch to light mode</span>
                    </div>
                </div>
            </aside>

            <main class="flex-1 pl-6 pt-4 overflow-y-auto dark:bg-gray-800">
                <div class="w-full">
                    <div class="flex justify-between py-4">
                        <div class="flex items-center">
                            <h3 class="text-2xl font-bold dark:text-white" id="month-and-year"></h3>
                            <button onclick="previous()" class="ml-4 p-2 me-2 bg-[lightgray] dark:bg-gray-800 dark:border border-white dark:text-white hover:bg-gray-400 rounded-md">Prev</button>
                            <button onclick="next()" class="bg-[lightgray] p-2 dark:bg-gray-800 dark:border border-white dark:text-white hover:bg-gray-400 rounded-md">Next</button>
                        </div>
                        <div class="flex items-center">
                            <button onclick="jumptoToday()" class="bg-[lightgray] p-2 mr-4 dark:bg-gray-800 dark:border border-white dark:text-white hover:bg-gray-400 rounded-md">Today</button>
                            <button onclick="document.getElementById('addEvent').showModal()" class="bg-[lightgray] p-2 mr-4 dark:bg-gray-800 dark:border border-white dark:text-white hover:bg-gray-400 rounded-md">Add Event</button>   
                        </div>       
                        <dialog id="addEvent" class="m-auto w-[512px] rounded-lg dark:bg-gray-800 dark:text-white p-6 shadow-lg backdrop:bg-black/50">
                            <!--Modal header-->
                            <div class="flex justify-between">
                                <h1 class="text-2xl font-semibold">Add Event</h1>
                                <button onclick="document.getElementById('addEvent').close()" class="hover:bg-[lightgray] dark:hover:bg-gray-950">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <!--Form-->
                            <div class="p-6">
                                <form method="dialog">
                                    <div class="flex items-center my-4">
                                        <label for="event-name" class="w-24 text-sm font-medium text-heading">Name</label>
                                        <input type="text" id="event-name" class="flex-1 min-w-80 border border-gray-500 px-2 py-1" required>
                                    </div>
                                    <div class="flex items-center my-4">
                                        <label for="event-date" class="w-24 text-sm font-medium text-heading">Date</label>
                                        <input type="date" id="event-date" class="border border-gray-500 px-2 py-1" required>
                                    </div> 
                                    <div class="flex items-center my-4">
                                        <label for="event-time" class="w-24 text-sm font-medium text-heading">Time</label>
                                        <input type="time" id="event-time" class="border border-gray-500 px-2 py-1">
                                    </div>
                                </form>
                            </div>
                            <!--Footer-->
                            <div class="flex justify-end">
                                <button class="bg-green-600 hover:bg-green-800 p-2 rounded-md text-white" onclick="add()">Add</button>
                            </div>
                        </dialog>
                    </div>
                    <table class="table-fixed w-full border-collapse border border-gray-300">
                        <thead>
                            <tr id="days-of-week" class="bg-gray-200 dark:bg-slate-900 dark:text-white">
                                <th class="border border-gray-300">Mon</th>
                                <th class="border border-gray-300">Tue</th>
                                <th class="border border-gray-300">Wed</th>
                                <th class="border border-gray-300">Thu</th>
                                <th class="border border-gray-300">Fri</th>
                                <th class="border border-gray-300">Sat</th>
                                <th class="border border-gray-300">Sun</th>
                            </tr>
                        </thead>
                        <tbody>           
                        </tbody>

                        <dialog id="edit-event-modal" class="m-auto w-[512px] rounded-lg p-6 dark:bg-gray-800 dark:text-white shadow-lg backdrop:bg-black/50">
                            <div class="flex justify-between">
                                <h1 class="text-2xl font-semibold">Edit Event</h1>
                                <button class="hover:bg-[lightgray] dark:hover:bg-gray-950" onclick="document.getElementById('edit-event-modal').close()">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <div class="p-6">
                                <form method="dialog">
                                    <div class="flex items-center my-4">
                                        <label for="edit-name" class="w-24 text-sm font-medium text-heading">Name</label>
                                        <input class="flex-1 border border-gray-500 px-2 py-1" type="text" id="edit-name" name="name">
                                    </div>
                                    <div class="flex items-center my-4">
                                        <label for="edit-date" class="w-24 text-sm font-medium text-heading">Date</label>
                                        <input class="border border-gray-500 px-2 py-1" type="date" id="edit-date" name="date">
                                    </div> 
                                    <div class="flex items-center my-4">
                                        <label for="edit-time" class="w-24 text-sm font-medium text-heading">Time</label>
                                        <input class="border border-gray-500 px-2 py-1" type="time" id="edit-time" name="time">
                                    </div>
                                </form>
                                <!--Footer-->
                                <div class="flex justify-between">
                                    <button class="hover:text-red-600" onclick="document.getElementById('delete-event-modal').showModal()">Delete</button>
                                    <button class="bg-gray-500 dark:bg-slate-800 dark:border border-white hover:bg-gray-600 dark:hover:bg-white dark:hover:text-black p-2 rounded-md text-white" onclick="edit()">Save</button>
                                </div>
                            </div>
                        </dialog>
                        <dialog id="delete-event-modal" class="m-auto rounded-lg p-6 shadow-lg backdrop:bg-black">
                            <div class="flex justify-between py-2">
                                <h1 class="text-2xl font-semibold">Delete Event</h1>
                                <button class="hover:bg-[lightgray]" onclick="document.getElementById('delete-event-modal').close()">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <div class="py-4">
                                <p>Are you sure you want to delete this event??? You won't be able to undo this?</p>
                            </div>
                            <div class="flex justify-end">
                                <button onclick="deleteEvent()" class="bg-red-600 mr-2 p-2 rounded-md text-white">Yes</button>
                                <button onclick="document.getElementById('delete-event-modal').close()" class="bg-gray-600 p-2 rounded-md text-white">No</button>
                            </div>
                        </dialog>
                    </table>
                </div>
            </main>
        </div>
    </body>
    <script src="script.js"></script>
    <script src="dark-mode-toggle.js"></script>
</html>
