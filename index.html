<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport"content="width=device-width, initial-scale=1.0"/>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
        <link rel="stylesheet" href="styles.css">
        <title>Calendar</title>
    </head>
    <body>
        <div class="flex h-screen">
            <aside class="left-0 z-40 w-1/5 bg-gray-200">
                <div class="p-6">
                    <h1 class="text-xl font-bold dark:text-white">Calendar</h1>
                </div>
                <button>

                </button>
                <button>
                    
                </button>
            </aside>

            <main class="flex-1 pl-6 pt-4 overflow-y-auto">
                <div class="w-full">
                    <div class="flex justify-between py-4">
                        <div class="flex items-center">
                            <h3 class="text-2xl font-bold dark:text-white" id="month-and-year"></h3>
                            <button onclick="previous()" class="ml-4 p-2 me-2 bg-[lightgray] dark:text-white hover:bg-gray-400 rounded-md">Prev</button>
                            <button onclick="next()" class="bg-[lightgray] p-2 dark:text-white hover:bg-gray-400 rounded-md">Next</button>
                        </div>
                        <div class="flex items-center">
                            <button onclick="document.getElementById('addEvent').showModal()" class="bg-[lightgray] p-2 mr-4 hover:bg-gray-400 rounded-md">Add Event</button>   
                        </div>       
                        <dialog id="addEvent" class="m-auto w-[512px] rounded-lg p-6 shadow-lg backdrop:bg-black/50">
                            <!--Modal header-->
                            <div class="flex justify-between">
                                <h1 class="text-2xl font-semibold">Add Event</h1>
                                <button onclick="document.getElementById('addEvent').close()" class="hover:bg-[lightgray]">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <!--Form-->
                            <div class="p-6">
                                <form method="dialog">
                                    <div class="flex items-center my-4">
                                        <label for="event-name" class="w-24 text-sm font-medium text-heading">Name</label>
                                        <input type="text" id="event-name" class="flex-1 min-w-80 border border-gray-500 px-2 py-1" required>
                                    </div>
                                    <div class="flex items-center my-4">
                                        <label for="event-date" class="w-24 text-sm font-medium text-heading">Date</label>
                                        <input type="date" id="event-date" class="border border-gray-500 px-2 py-1" required>
                                    </div> 
                                    <div class="flex items-center my-4">
                                        <label for="event-time" class="w-24 text-sm font-medium text-heading">Time</label>
                                        <input type="time" id="event-time" class="border border-gray-500 px-2 py-1">
                                    </div>
                                </form>
                            </div>
                            <!--Footer-->
                            <div class="flex justify-end">
                                <button class="bg-green-600 hover:bg-green-800 p-2 rounded-md text-white" onclick="add()">Add</button>
                            </div>
                        </dialog>
                    </div>
                    <table class="table-fixed w-full border-collapse border border-gray-300">
                        <thead>
                            <tr id="days-of-week" class="bg-gray-200">
                                <th class="border border-gray-300">Mon</th>
                                <th class="border border-gray-300">Tue</th>
                                <th class="border border-gray-300">Wed</th>
                                <th class="border border-gray-300">Thu</th>
                                <th class="border border-gray-300">Fri</th>
                                <th class="border border-gray-300">Sat</th>
                                <th class="border border-gray-300">Sun</th>
                            </tr>
                        </thead>
                        <tbody>           
                        </tbody>

                        <dialog id="edit-event-modal" class="m-auto w-[512px] rounded-lg p-6 shadow-lg backdrop:bg-black/50">
                            <div class="flex justify-between">
                                <h1 class="text-2xl font-semibold">Edit Event</h1>
                                <button class="hover:bg-[lightgray]" onclick="document.getElementById('edit-event-modal').close()">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <div class="p-6">
                                <form method="dialog">
                                    <div class="flex items-center my-4">
                                        <label for="edit-name" class="w-24 text-sm font-medium text-heading">Name</label>
                                        <input class="flex-1 border border-gray-500 px-2 py-1" type="text" id="edit-name" name="name">
                                    </div>
                                    <div class="flex items-center my-4">
                                        <label for="edit-date" class="w-24 text-sm font-medium text-heading">Date</label>
                                        <input class="border border-gray-500 px-2 py-1" type="date" id="edit-date" name="date">
                                    </div> 
                                    <div class="flex items-center my-4">
                                        <label for="edit-time" class="w-24 text-sm font-medium text-heading">Time</label>
                                        <input class="border border-gray-500 px-2 py-1" type="time" id="edit-time" name="time">
                                    </div>
                                </form>
                                <!--Footer-->
                                <div class="flex justify-between">
                                    <button class="hover:text-red-600" onclick="document.getElementById('delete-event-modal').showModal()">Delete</button>
                                    <button class="bg-gray-500 hover:bg-gray-600 p-2 rounded-md text-white" onclick="edit()">Save</button>
                                </div>
                            </div>
                        </dialog>
                        <dialog id="delete-event-modal" class="m-auto rounded-lg p-6 shadow-lg backdrop:bg-black">
                            <div class="flex justify-between py-2">
                                <h1 class="text-2xl font-semibold">Delete Event</h1>
                                <button class="hover:bg-[lightgray]" onclick="document.getElementById('delete-event-modal').close()">
                                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <div class="py-4">
                                <p>Are you sure you want to delete this event??? You won't be able to undo this?</p>
                            </div>
                            <div class="flex justify-end">
                                <button onclick="deleteEvent()" class="bg-red-600 mr-2 p-2 rounded-md text-white">Yes</button>
                                <button onclick="document.getElementById('delete-event-modal').close()" class="bg-gray-600 p-2 rounded-md text-white">No</button>
                            </div>
                        </dialog>
                    </table>
                </div>
            </main>
        </div>
    </body>
    <script src="script.js"></script>
</html>
